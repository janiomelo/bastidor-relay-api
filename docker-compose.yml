version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bastidor-postgres
    environment:
      POSTGRES_DB: bastidor_relay
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d bastidor_relay"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: bastidor-relay-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://usuario:senha@postgres:5432/bastidor_relay
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: bastidor-storage
      S3_REGION: us-east-1
      HEALTH_CHECK_TIMEOUT_MS: 500
      HEALTH_CACHE_TTL_SECONDS: 5
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  minio:
    image: minio/minio:latest
    container_name: bastidor-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/minio_root
    command: server /minio_root --console-address ":9001"

volumes:
  postgres-data:
  minio-data:
