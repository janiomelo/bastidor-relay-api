name: Deploy para Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Testar dentro do Docker (build + lint + test)
        run: docker build --target test -t bastidor-relay:test .

  deploy:
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Validar token Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          TOKEN="${RAILWAY_TOKEN:-$RAILWAY_API_TOKEN}"
          if [[ -z "$TOKEN" ]]; then
            echo "Token ausente. Configure um secret RAILWAY_TOKEN (ou RAILWAY_API_TOKEN)."
            exit 1
          fi
          if [[ -z "$RAILWAY_PROJECT_ID" ]]; then
            echo "RAILWAY_PROJECT_ID ausente. Configure esse secret no GitHub Actions."
            exit 1
          fi

      - name: Deploy no Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
        run: |
          TOKEN="${RAILWAY_TOKEN:-$RAILWAY_API_TOKEN}"
          export RAILWAY_TOKEN="$TOKEN"
          SERVICE_NAME="${RAILWAY_SERVICE_NAME:-bastidor-relay-api}"
          echo "Deploying service: $SERVICE_NAME"
          railway up --service "$SERVICE_NAME" --environment production --project "$RAILWAY_PROJECT_ID" --detach

      - name: Aguardar deploy e validar healthcheck
        env:
          RAILWAY_SERVICE_DOMAIN: ${{ vars.RAILWAY_SERVICE_DOMAIN }}
        run: |
          echo "Aguardando Railway iniciar o deploy..."
          sleep 20
          for i in {1..20}; do
            if curl -sf "https://${RAILWAY_SERVICE_DOMAIN}/saude" > /dev/null; then
              echo "✓ Healthcheck passou em https://${RAILWAY_SERVICE_DOMAIN}/saude"
              exit 0
            fi
            echo "Tentativa $i/20 - aguardando..."
            sleep 15
          done
          echo "✗ Healthcheck falhou após 5 minutos"
          exit 1
