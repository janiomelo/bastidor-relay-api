name: Deploy para Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bastidor_relay_test
          POSTGRES_USER: usuario
          POSTGRES_PASSWORD: senha
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Compilar TypeScript
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Testes
        env:
          DATABASE_URL: postgresql://usuario:senha@localhost:5432/bastidor_relay_test
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy no Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --environment production --detach

      - name: Aguardar deploy e validar healthcheck
        env:
          RAILWAY_SERVICE_DOMAIN: ${{ vars.RAILWAY_SERVICE_DOMAIN }}
        run: |
          echo "Aguardando Railway iniciar o deploy..."
          sleep 20
          for i in {1..20}; do
            if curl -sf "https://${RAILWAY_SERVICE_DOMAIN}/saude" > /dev/null; then
              echo "✓ Healthcheck passou em https://${RAILWAY_SERVICE_DOMAIN}/saude"
              exit 0
            fi
            echo "Tentativa $i/20 - aguardando..."
            sleep 15
          done
          echo "✗ Healthcheck falhou após 5 minutos"
          exit 1
